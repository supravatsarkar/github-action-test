name: "Hello world workflow"
# Trigger when push to master or production
on:
  push:
    branches:
      - master
      - production
jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    steps:
      - name: "Print Hello World"
        run: echo "Hello World!"
      - name: "Print Hello World 2"
        run: echo "Hello World 2!"
